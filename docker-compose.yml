services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: chakula_food_generator
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3